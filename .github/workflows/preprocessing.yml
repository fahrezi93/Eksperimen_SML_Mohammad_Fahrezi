name: Preprocessing Automation

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'preprocessing/data_preprocessing/**'  # Jangan trigger kalau yang berubah hasil outputnya
  pull_request:
    branches:
      - main
  workflow_dispatch: # Memungkinkan untuk trigger manual melalui UI GitHub

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest
    
    # PERBAIKAN: Menambahkan hak akses write untuk bot agar bisa push
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7' # Sesuai ketentuan minimal dicoding

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn
        
    - name: Run Automate Preprocessing Script
      run: |
        cd preprocessing
        python automate_Mohammad_Fahrezi.py
        
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add preprocessing/data_preprocessing/insurance_clean.csv
        # Commit hanya jika ada perubahan file
        git commit -m "Automated preprocessing result update" || echo "No changes to commit"
        git push
